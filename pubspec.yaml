name: cerquita
description: Cerquita Vendor & User App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_tts: ^3.8.5
  http: ^1.2.1
  geolocator: ^10.1.0
  geocoding: ^2.2.0
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^2.0.0
  url_launcher: ^6.2.5
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  cupertino_icons: ^1.0.8
  carousel_slider: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/brochures/